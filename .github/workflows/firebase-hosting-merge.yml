name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'npm'
          cache-dependency-path: './package-lock.json' 
      - run: npm ci && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CLIENT_API_KEY: ${{ secrets.VITE_CLIENT_API_KEY }}
          VITE_ENV: ${{ secrets.VITE_ENV }}
          VITE_PUBLIC_CDN: ${{ secrets.VITE_PUBLIC_CDN }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_N3XTBRIDGE_DF3B5 }}
          channelId: live
          projectId: n3xtbridge-df3b5
